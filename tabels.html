<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <table border="1">
        <caption style="text-align: right; caption-side:bottom;" >Some beautiful names  </caption>
        <!--first row-->
        <tr>
            <th>slno.</th>
            <th>name</th>
            <th>age</th>
       </tr>
        <!--second row-->
        <tr>
            <td>1</td>
            <td>hassan</td>
            <td>20</td>
        </tr>
        <!--third row-->
        <tr>
            <td>2</td>
            <td>ali</td>
            <td>25</td>
        </tr>
        <!--fourth row-->
        <tr><td>3</td>
            <td>ahmed</td>
            <td>30</td>
        </tr>
    </table>
</body>
</html>
<!-- table tag is used to make the table in the webpage and the table is closed with a slash at the end because it is a self closing tag and it does not have any closing tag like <table> </table> -->
 <!-- tr tag is used to make the row in the table and the row is closed with a slash at the end because it is a self closing tag and it does not have any closing tag like <tr> </tr> -->
  <!-- th tag is used to make the heading in the table and the heading is closed with a slash at the end because it is a self closing tag and it does not have any closing tag like <th> </th> -->
   <!-- td tag is used to make the data in the table and the data is closed with a slash at the end because it is a self closing tag and it does not have any closing tag like <td> </td> -->
    <!-- border attribute is used to give the border to the table and the value of the border attribute is given in pixels -->
     <!-- caption tag is used to give the title to the table and the caption is closed with a slash at the end because it is a self closing tag and it does not have any closing tag like <caption> </caption> -->
      <!-- text-align attribute is used to align the text in the caption and the value of the text-align attribute can be left, right, center or justify -->
       <!-- caption-side attribute is used to give the position of the caption and the value of the caption-side attribute can be top, bottom, left or right -->
