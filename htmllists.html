<body>
    <h3>orderd Lists</h3>
    <ol type="1" start="1">
        <li>Biryani</li>
        <li>Dosa</li>
        <li>Idly</li>
    </ol>
    <hr>
    <h3>unordered Lists</h3>
    <ul>
        <li>Biryani</li>
        <li>Dosa</li>
        <li>Idly</li>
    </ul>
    <hr>
    <h3>description Lists/defination list</h3>
    <dl>
        <dt>Biryani</dt>
        <dd>Biryani is a food</dd>
        <dt>Dosa</dt>
        <dd>Dosa is a food</dd>
        <dt>Idly</dt>
        <dd>Idly is a food</dd>
        </dl>
    <hr>
    <h3>Nested Lists</h3>
    <ol>
        <li>Biryani</li>
        <li>Dosa
            <ul>
                <li>Idly</li>
                <li>Vada</li>
            </ul>
        </li>
        <li>Parotta</li>
    
</body>
</html>
