<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabel Span</title>
</head>
<body>
    
    <table border="1" style="width:50%;">
        <tr>
            <td  colspan="4">1</td>
            
        </tr>
        <tr>
            <td rowspan="2">1</td>
            <td>2</td>
            <td>3</td>
            <td rowspan="2">4</td>
        </tr>
        <tr>
            
            <td>2</td>
            <td>3</td>
            
        </tr>
        <tr>
            <td colspan="4">1</td>
           
        </tr>
        <br>
        <hr>
        <br>
    </tabel>
    <hr
</body>
</html>
<!-- colspan attribute is used to merge the columns and the value of the colspan attribute is given in number and it will merge the number of columns according to the value given in the colspan attribute -->
